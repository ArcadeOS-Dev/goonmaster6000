<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcHub — 80+ Free Online Calculators & Tools</title>
<meta name="description" content="Free online calculators and tools: financial, health, math, unit converters, developer tools, and more. All in one place, no sign-up required.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .search-bar {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--muted); }

  /* LAYOUT */
  .container { display: flex; height: calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .cat-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px 4px;
  }
  .tool-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 16px;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-left: 3px solid transparent;
  }
  .tool-btn:hover { background: var(--surface2); color: var(--accent); }
  .tool-btn.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .tool-panel { display: none; animation: fadeIn 0.2s ease; }
  .tool-panel.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .tool-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .tool-desc {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 28px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 560px;
  }

  /* FORM ELEMENTS */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  input[type=number], input[type=text], input[type=date], select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 80px; }

  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }

  /* BUTTON */
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-outline {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
  }

  /* RESULT */
  .result {
    margin-top: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.8;
    display: none;
  }
  .result.show { display: block; }
  .result-main {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent3);
    margin-bottom: 8px;
  }
  .result-row { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; }
  .result-row span:last-child { color: var(--text); }

  /* HOME GRID */
  .home-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    max-width: 900px;
  }
  .home-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .home-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .home-card-icon { font-size: 22px; margin-bottom: 8px; }
  .home-card-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; }
  .home-card-cat { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* SPECIAL LAYOUTS */
  .calc-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 12px; }
  .calc-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .calc-btn:hover { background: var(--border); }
  .calc-btn.op { color: var(--accent); }
  .calc-btn.eq { background: var(--accent); color: #fff; grid-column: span 2; }
  .calc-btn.clear { color: var(--accent2); }
  .calc-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: right;
    font-size: 28px;
    font-family: 'Syne', sans-serif;
    margin-bottom: 8px;
    min-height: 64px;
    word-break: break-all;
  }
  .calc-expr { font-size: 12px; color: var(--muted); min-height: 18px; }

  .spin-wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  canvas { border-radius: 50%; }

  .todo-list { list-style: none; margin-top: 12px; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; font-size: 13px; }
  .todo-item input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; }
  .todo-item.done span { text-decoration: line-through; color: var(--muted); }
  .todo-del { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
  .todo-del:hover { color: var(--accent2); }

  .timer-display {
    font-family: 'Syne', sans-serif;
    font-size: 64px;
    font-weight: 800;
    text-align: center;
    color: var(--accent3);
    letter-spacing: 0.05em;
    margin: 20px 0;
  }
  .timer-btns { display: flex; gap: 10px; justify-content: center; }

  .typing-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 12px;
    min-height: 80px;
    color: var(--muted);
  }
  .typing-area span.correct { color: var(--accent3); }
  .typing-area span.wrong { color: var(--accent2); background: rgba(255,106,155,0.15); }
  .typing-area span.current { border-bottom: 2px solid var(--accent); }

  .gradient-preview {
    height: 80px;
    border-radius: 8px;
    margin-bottom: 12px;
    transition: all 0.3s;
  }
  .shadow-preview {
    width: 100px;
    height: 100px;
    background: var(--surface2);
    border-radius: 8px;
    margin: 16px auto;
    transition: box-shadow 0.2s;
  }
  .btn-preview-wrap { padding: 20px; text-align: center; }
  .color-swatch { width: 40px; height: 40px; border-radius: 6px; border: 1px solid var(--border); display: inline-block; vertical-align: middle; margin-right: 8px; }

  .dice-wrap { text-align: center; }
  .dice-face { font-size: 80px; margin: 16px 0; display: inline-block; transition: transform 0.3s; }
  .dice-face.rolling { animation: roll 0.3s ease; }
  @keyframes roll { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-20deg)} 75%{transform:rotate(20deg)} }

  .love-meter { margin-top: 12px; height: 20px; background: var(--surface2); border-radius: 10px; overflow: hidden; }
  .love-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), #ff3d71); border-radius: 10px; transition: width 0.8s cubic-bezier(.34,1.56,.64,1); }

  .pomodoro-mode { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 8px; }

  code-out {
    display: block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 12px;
    word-break: break-all;
    margin-top: 12px;
    color: var(--accent3);
  }

  .no-result { display: none; }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .sidebar { width: 180px; min-width: 180px; }
    .main { padding: 20px 16px; }
    .home-grid { grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); }
  }
  @media (max-width: 500px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; height: auto; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>

// ─── RENDER SIDEBAR ───────────────────────────────────────────────────────────
function buildSidebar(filter='') {
  const sidebar = document.getElementById('sidebar');
  const filtered = filter ? TOOLS.filter(t => t.name.toLowerCase().includes(filter.toLowerCase()) || t.cat.toLowerCase().includes(filter.toLowerCase())) : TOOLS;
  const cats = [...new Set(filtered.map(t=>t.cat))];
  sidebar.innerHTML = '';
  if(!filter){
    const homeBtn = document.createElement('button');
    homeBtn.className = 'tool-btn' + (currentTool==='home'?' active':'');
    homeBtn.textContent = '🏠 Home';
    homeBtn.onclick = () => showTool('home');
    sidebar.appendChild(homeBtn);
  }
  cats.forEach(cat => {
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.textContent = cat;
    sidebar.appendChild(lbl);
    filtered.filter(t=>t.cat===cat).forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'tool-btn' + (currentTool===t.id?' active':'');
      btn.textContent = t.name;
      btn.onclick = () => showTool(t.id);
      sidebar.appendChild(btn);
    });
  });
}

// ─── SHOW TOOL ────────────────────────────────────────────────────────────────
let currentTool = 'home';
function showTool(id) {
  currentTool = id;
  buildSidebar(document.getElementById('searchInput').value);
  const main = document.getElementById('main');
  main.innerHTML = '';
  if(id === 'home') { renderHome(); return; }
  const tool = TOOLS.find(t=>t.id===id);
  if(!tool) return;
  const html = getToolHTML(id, tool.name);
  main.innerHTML = html;
  afterRender(id);
}

function searchTools(val){
  buildSidebar(val);
  if(val){
    const filtered = TOOLS.filter(t=>t.name.toLowerCase().includes(val.toLowerCase()));
    if(filtered.length===1) showTool(filtered[0].id);
  }
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function renderHome(){
  const cats = [...new Set(TOOLS.map(t=>t.cat))];
  const icons = {'🧮 Basic':'🧮','🔄 Converters':'🔄','💰 Financial':'💰','🧑‍⚕️ Health':'🧑‍⚕️','📚 Math':'📚','💻 Dev Tools':'💻','🎨 Design':'🎨','📱 Social':'📱','⚡ Productivity':'⚡','🎮 Fun':'🎮','🏗️ Engineering':'🏗️','🏠 Real Life':'🏠'};
  let html = `<div class="tool-title">Welcome to CalcHub</div><div class="tool-desc">80+ free tools. Click any tool to get started.</div><div class="home-grid">`;
  TOOLS.forEach(t=>{
    html+=`<div class="home-card" onclick="showTool('${t.id}')"><div class="home-card-icon">${icons[t.cat]||'🔧'}</div><div class="home-card-name">${t.name}</div><div class="home-card-cat">${t.cat}</div></div>`;
  });
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

// ─── TOOL HTML ────────────────────────────────────────────────────────────────
function getToolHTML(id, name){
  const wrap = (desc, body) => `<div class="tool-title">${name}</div><div class="tool-desc">${desc}</div><div class="card">${body}</div>`;
  const res = (id2) => `<div class="result" id="${id2}"></div>`;
  const btn = (label, fn) => `<button class="btn" onclick="${fn}">${label}</button>`;

  switch(id){

  // ── SIMPLE CALCULATOR
  case 'simple-calc': return wrap('Basic arithmetic calculator.',`
    <div class="calc-display"><div class="calc-expr" id="sc-expr"></div><div id="sc-disp">0</div></div>
    <div class="calc-grid">
      ${['7','8','9','÷','4','5','6','×','1','2','3','−','0','.','clear','+']. map(k=>{
        const cls = ['÷','×','−','+'].includes(k)?'op':k==='clear'?'clear':'';
        return `<button class="calc-btn ${cls}" onclick="scKey('${k}')">${k==='clear'?'C':k}</button>`;
      }).join('')}
      <button class="calc-btn eq" onclick="scKey('=')">=</button>
    </div>`);

  // ── SCIENTIFIC CALCULATOR
  case 'scientific': return wrap('Scientific calculator with trig, log and power functions.',`
    <div class="calc-display"><div class="calc-expr" id="sci-expr"></div><div id="sci-disp">0</div></div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px">
      ${['sin','cos','tan','log','ln','√','x²','xʸ','π','e','(',')','7','8','9','÷','4','5','6','×','1','2','3','−','0','.','C','+'].map(k=>{
        const cls=['sin','cos','tan','log','ln','√','x²','xʸ','π','e','(',')'].includes(k)?'op':'';
        return `<button class="calc-btn ${cls}" style="font-size:12px" onclick="sciKey('${k}')">${k}</button>`;
      }).join('')}
      <button class="calc-btn eq" style="grid-column:span 2" onclick="sciKey('=')">=</button>
    </div>`);

  // ── PERCENTAGE
  case 'percentage': return wrap('Calculate percentages in multiple ways.',`
    <div class="field"><label>Mode</label>
      <select id="pct-mode" onchange="pctMode()">
        <option value="1">X% of Y</option>
        <option value="2">X is what % of Y</option>
        <option value="3">% Change from X to Y</option>
        <option value="4">X increased/decreased by Y%</option>
      </select>
    </div>
    <div class="row"><div class="field"><label id="pct-l1">Value X</label><input type="number" id="pct-a" placeholder="e.g. 20"></div>
    <div class="field"><label id="pct-l2">Value Y</label><input type="number" id="pct-b" placeholder="e.g. 80"></div></div>
    ${btn('Calculate','calcPct()')}${res('pct-res')}`);

  // ── FRACTION
  case 'fraction': return wrap('Add, subtract, multiply, divide fractions.',`
    <div class="row">
      <div class="field"><label>Numerator 1</label><input type="number" id="fn1" value="1"></div>
      <div class="field"><label>Denominator 1</label><input type="number" id="fd1" value="2"></div>
    </div>
    <div class="field"><label>Operation</label>
      <select id="fop"><option>+</option><option>−</option><option>×</option><option>÷</option></select>
    </div>
    <div class="row">
      <div class="field"><label>Numerator 2</label><input type="number" id="fn2" value="1"></div>
      <div class="field"><label>Denominator 2</label><input type="number" id="fd2" value="3"></div>
    </div>
    ${btn('Calculate','calcFraction()')}${res('frac-res')}`);

  // ── RATIO
  case 'ratio': return wrap('Simplify ratios and find missing values.',`
    <div class="row">
      <div class="field"><label>A</label><input type="number" id="ra" value="2"></div>
      <div class="field"><label>B</label><input type="number" id="rb" value="6"></div>
      <div class="field"><label>C (optional)</label><input type="number" id="rc" placeholder="find D"></div>
    </div>
    ${btn('Calculate','calcRatio()')}${res('ratio-res')}`);

  // ── AVERAGE
  case 'average': return wrap('Calculate average of a list of numbers.',`
    <div class="field"><label>Numbers (comma-separated)</label><input type="text" id="avg-nums" placeholder="e.g. 10, 20, 30, 40"></div>
    ${btn('Calculate','calcAvg()')}${res('avg-res')}`);

  // ── MEAN MEDIAN MODE
  case 'mean-median': return wrap('Calculate mean, median and mode.',`
    <div class="field"><label>Numbers (comma-separated)</label><input type="text" id="mmm-nums" placeholder="e.g. 5, 3, 8, 3, 10"></div>
    ${btn('Calculate','calcMMM()')}${res('mmm-res')}`);

  // ── STD DEV
  case 'std-dev': return wrap('Calculate standard deviation and variance.',`
    <div class="field"><label>Numbers (comma-separated)</label><input type="text" id="sd-nums" placeholder="e.g. 2, 4, 4, 4, 5, 5, 7, 9"></div>
    <div class="field"><label>Type</label><select id="sd-type"><option value="p">Population</option><option value="s">Sample</option></select></div>
    ${btn('Calculate','calcSD()')}${res('sd-res')}`);

  // ── RANDOM NUMBER
  case 'random-num': return wrap('Generate random numbers.',`
    <div class="row">
      <div class="field"><label>Min</label><input type="number" id="rn-min" value="1"></div>
      <div class="field"><label>Max</label><input type="number" id="rn-max" value="100"></div>
      <div class="field"><label>Count</label><input type="number" id="rn-count" value="1" min="1" max="100"></div>
    </div>
    ${btn('Generate','genRandom()')}${res('rn-res')}`);

  // ── ROUNDING
  case 'rounding': return wrap('Round numbers to any decimal place.',`
    <div class="field"><label>Number</label><input type="number" id="round-n" placeholder="e.g. 3.14159"></div>
    <div class="field"><label>Decimal Places</label><input type="number" id="round-d" value="2" min="0" max="15"></div>
    ${btn('Round','calcRound()')}${res('round-res')}`);

  // ── UNIT CONVERTERS (generic template)
  case 'length': return unitConvHTML('length','Length Converter',[
    ['Millimeter','mm',0.001],['Centimeter','cm',0.01],['Meter','m',1],['Kilometer','km',1000],
    ['Inch','in',0.0254],['Foot','ft',0.3048],['Yard','yd',0.9144],['Mile','mi',1609.344]]);
  case 'weight': return unitConvHTML('weight','Weight Converter',[
    ['Milligram','mg',0.000001],['Gram','g',0.001],['Kilogram','kg',1],['Tonne','t',1000],
    ['Ounce','oz',0.0283495],['Pound','lb',0.453592],['Stone','st',6.35029]]);
  case 'temperature': return wrap('Convert between temperature scales.',`
    <div class="field"><label>Value</label><input type="number" id="temp-val" placeholder="Enter temperature" oninput="calcTemp()"></div>
    <div class="field"><label>From</label><select id="temp-from" onchange="calcTemp()">
      <option>Celsius</option><option>Fahrenheit</option><option>Kelvin</option></select></div>
    <div class="result show" id="temp-res" style="display:block"></div>`);
  case 'area': return unitConvHTML('area','Area Converter',[
    ['sq mm','mm²',0.000001],['sq cm','cm²',0.0001],['sq m','m²',1],['sq km','km²',1000000],
    ['sq ft','ft²',0.092903],['sq yd','yd²',0.836127],['acre','ac',4046.86],['hectare','ha',10000]]);
  case 'volume': return unitConvHTML('volume','Volume Converter',[
    ['Milliliter','ml',0.001],['Liter','L',1],['Cubic Meter','m³',1000],
    ['Cup','cup',0.236588],['Pint','pt',0.473176],['Quart','qt',0.946353],['Gallon','gal',3.78541]]);
  case 'speed': return unitConvHTML('speed','Speed Converter',[
    ['m/s','m/s',1],['km/h','km/h',0.277778],['mph','mph',0.44704],['knot','kn',0.514444],['ft/s','ft/s',0.3048]]);
  case 'time-conv': return unitConvHTML('time-conv','Time Converter',[
    ['Millisecond','ms',0.001],['Second','s',1],['Minute','min',60],['Hour','hr',3600],
    ['Day','day',86400],['Week','wk',604800],['Month','mo',2629800],['Year','yr',31557600]]);
  case 'energy': return unitConvHTML('energy','Energy Converter',[
    ['Joule','J',1],['Kilojoule','kJ',1000],['Calorie','cal',4.184],['Kilocalorie','kcal',4184],
    ['Watt-hour','Wh',3600],['kWh','kWh',3600000],['BTU','BTU',1055.06]]);
  case 'power': return unitConvHTML('power','Power Converter',[
    ['Watt','W',1],['Kilowatt','kW',1000],['Megawatt','MW',1000000],
    ['Horsepower','hp',745.7],['BTU/hr','BTU/hr',0.293071]]);
  case 'pressure': return unitConvHTML('pressure','Pressure Converter',[
    ['Pascal','Pa',1],['Kilopascal','kPa',1000],['Bar','bar',100000],
    ['PSI','psi',6894.76],['Atmosphere','atm',101325],['mmHg','mmHg',133.322]]);
  case 'data-storage': return unitConvHTML('data-storage','Data Storage Converter',[
    ['Bit','b',1/8],['Byte','B',1],['Kilobyte','KB',1024],['Megabyte','MB',1048576],
    ['Gigabyte','GB',1073741824],['Terabyte','TB',1099511627776],['Petabyte','PB',1.126e15]]);
  case 'angle': return unitConvHTML('angle','Angle Converter',[
    ['Degree','°',1],['Radian','rad',57.2958],['Gradian','grad',0.9],['Turn','turn',360]]);
  case 'fuel-eff': return unitConvHTML('fuel-eff','Fuel Efficiency Converter',[
    ['km/L','km/L',1],['L/100km','L/100km',null],['mpg (US)','mpg',2.35215],['mpg (UK)','mpg UK',2.82481]]);

  // ── FINANCIAL
  case 'emi': return wrap('Calculate monthly EMI for loans.',`
    <div class="field"><label>Loan Amount (₹)</label><input type="number" id="emi-p" placeholder="e.g. 500000"></div>
    <div class="row">
      <div class="field"><label>Annual Interest Rate (%)</label><input type="number" id="emi-r" placeholder="e.g. 8.5"></div>
      <div class="field"><label>Tenure (Months)</label><input type="number" id="emi-n" placeholder="e.g. 60"></div>
    </div>
    ${btn('Calculate EMI','calcEMI()')}${res('emi-res')}`);

  case 'loan': return wrap('Full loan repayment breakdown.',`
    <div class="field"><label>Principal Amount</label><input type="number" id="loan-p" placeholder="e.g. 100000"></div>
    <div class="row">
      <div class="field"><label>Annual Rate (%)</label><input type="number" id="loan-r" placeholder="e.g. 10"></div>
      <div class="field"><label>Years</label><input type="number" id="loan-y" placeholder="e.g. 5"></div>
    </div>
    ${btn('Calculate','calcLoan()')}${res('loan-res')}`);

  case 'mortgage': return wrap('Monthly mortgage payment calculator.',`
    <div class="field"><label>Home Price</label><input type="number" id="mort-price" placeholder="e.g. 5000000"></div>
    <div class="field"><label>Down Payment</label><input type="number" id="mort-down" placeholder="e.g. 1000000"></div>
    <div class="row">
      <div class="field"><label>Annual Rate (%)</label><input type="number" id="mort-r" placeholder="e.g. 8"></div>
      <div class="field"><label>Loan Term (Years)</label><input type="number" id="mort-y" placeholder="e.g. 20"></div>
    </div>
    ${btn('Calculate','calcMortgage()')}${res('mort-res')}`);

  case 'interest': return wrap('Simple and compound interest calculator.',`
    <div class="field"><label>Principal</label><input type="number" id="int-p" placeholder="e.g. 10000"></div>
    <div class="row">
      <div class="field"><label>Rate (% per year)</label><input type="number" id="int-r" placeholder="e.g. 7"></div>
      <div class="field"><label>Time (Years)</label><input type="number" id="int-t" placeholder="e.g. 3"></div>
    </div>
    <div class="field"><label>Compound Frequency</label>
      <select id="int-freq"><option value="1">Yearly</option><option value="2">Half-Yearly</option><option value="4">Quarterly</option><option value="12">Monthly</option></select>
    </div>
    ${btn('Calculate','calcInterest()')}${res('int-res')}`);

  case 'sip': return wrap('SIP (Systematic Investment Plan) returns calculator.',`
    <div class="field"><label>Monthly Investment (₹)</label><input type="number" id="sip-m" placeholder="e.g. 5000"></div>
    <div class="row">
      <div class="field"><label>Expected Return (% p.a.)</label><input type="number" id="sip-r" placeholder="e.g. 12"></div>
      <div class="field"><label>Time Period (Years)</label><input type="number" id="sip-y" placeholder="e.g. 10"></div>
    </div>
    ${btn('Calculate','calcSIP()')}${res('sip-res')}`);

  case 'invest-return': return wrap('Calculate investment return and CAGR.',`
    <div class="field"><label>Initial Investment</label><input type="number" id="ir-init" placeholder="e.g. 50000"></div>
    <div class="field"><label>Final Value</label><input type="number" id="ir-final" placeholder="e.g. 90000"></div>
    <div class="field"><label>Years</label><input type="number" id="ir-yr" placeholder="e.g. 5"></div>
    ${btn('Calculate','calcIR()')}${res('ir-res')}`);

  case 'savings': return wrap('Future value of regular savings.',`
    <div class="field"><label>Monthly Savings</label><input type="number" id="sav-m" placeholder="e.g. 2000"></div>
    <div class="row">
      <div class="field"><label>Annual Rate (%)</label><input type="number" id="sav-r" placeholder="e.g. 6"></div>
      <div class="field"><label>Years</label><input type="number" id="sav-y" placeholder="e.g. 10"></div>
    </div>
    ${btn('Calculate','calcSavings()')}${res('sav-res')}`);

  case 'retirement': return wrap('How much you need to retire comfortably.',`
    <div class="field"><label>Current Age</label><input type="number" id="ret-age" placeholder="e.g. 30"></div>
    <div class="field"><label>Retirement Age</label><input type="number" id="ret-rage" placeholder="e.g. 60"></div>
    <div class="field"><label>Monthly Expenses Today (₹)</label><input type="number" id="ret-exp" placeholder="e.g. 40000"></div>
    <div class="row">
      <div class="field"><label>Inflation Rate (%)</label><input type="number" id="ret-inf" value="6"></div>
      <div class="field"><label>Expected Return (%)</label><input type="number" id="ret-ret" value="10"></div>
    </div>
    ${btn('Calculate','calcRetirement()')}${res('ret-res')}`);

  case 'gst': return wrap('GST (Goods and Services Tax) calculator for India.',`
    <div class="field"><label>Amount (₹)</label><input type="number" id="gst-amt" placeholder="e.g. 1000"></div>
    <div class="field"><label>GST Rate (%)</label>
      <select id="gst-rate"><option value="5">5%</option><option value="12">12%</option><option value="18" selected>18%</option><option value="28">28%</option></select>
    </div>
    <div class="field"><label>Type</label>
      <select id="gst-type"><option value="excl">Exclusive (Add GST)</option><option value="incl">Inclusive (Extract GST)</option></select>
    </div>
    ${btn('Calculate','calcGST()')}${res('gst-res')}`);

  case 'income-tax': return wrap('Estimate Indian income tax (FY 2024-25, New Regime).',`
    <div class="field"><label>Annual Income (₹)</label><input type="number" id="tax-inc" placeholder="e.g. 800000"></div>
    <div class="field"><label>Regime</label>
      <select id="tax-regime"><option value="new">New Regime</option><option value="old">Old Regime</option></select>
    </div>
    ${btn('Calculate','calcTax()')}${res('tax-res')}`);

  case 'discount': return wrap('Calculate discounted price and savings.',`
    <div class="field"><label>Original Price</label><input type="number" id="disc-orig" placeholder="e.g. 1500"></div>
    <div class="field"><label>Discount (%)</label><input type="number" id="disc-pct" placeholder="e.g. 20"></div>
    ${btn('Calculate','calcDiscount()')}${res('disc-res')}`);

  case 'profit-loss': return wrap('Calculate profit or loss.',`
    <div class="field"><label>Cost Price</label><input type="number" id="pl-cp" placeholder="e.g. 500"></div>
    <div class="field"><label>Selling Price</label><input type="number" id="pl-sp" placeholder="e.g. 650"></div>
    ${btn('Calculate','calcPL()')}${res('pl-res')}`);

  case 'inflation': return wrap('Calculate inflation-adjusted value.',`
    <div class="field"><label>Initial Amount</label><input type="number" id="inf-amt" placeholder="e.g. 10000"></div>
    <div class="row">
      <div class="field"><label>Inflation Rate (%)</label><input type="number" id="inf-rate" placeholder="e.g. 6"></div>
      <div class="field"><label>Years</label><input type="number" id="inf-yr" placeholder="e.g. 10"></div>
    </div>
    ${btn('Calculate','calcInflation()')}${res('inf-res')}`);

  // ── HEALTH
  case 'bmi': return wrap('Body Mass Index calculator.',`
    <div class="row">
      <div class="field"><label>Weight (kg)</label><input type="number" id="bmi-w" placeholder="e.g. 70"></div>
      <div class="field"><label>Height (cm)</label><input type="number" id="bmi-h" placeholder="e.g. 175"></div>
    </div>
    ${btn('Calculate','calcBMI()')}${res('bmi-res')}`);

  case 'bmr': return wrap('Basal Metabolic Rate — calories your body burns at rest.',`
    <div class="row">
      <div class="field"><label>Weight (kg)</label><input type="number" id="bmr-w" placeholder="70"></div>
      <div class="field"><label>Height (cm)</label><input type="number" id="bmr-h" placeholder="175"></div>
    </div>
    <div class="row">
      <div class="field"><label>Age</label><input type="number" id="bmr-age" placeholder="25"></div>
      <div class="field"><label>Gender</label><select id="bmr-g"><option>Male</option><option>Female</option></select></div>
    </div>
    ${btn('Calculate','calcBMR()')}${res('bmr-res')}`);

  case 'calorie': return wrap('Daily calorie needs based on activity level.',`
    <div class="row">
      <div class="field"><label>Weight (kg)</label><input type="number" id="cal-w" placeholder="70"></div>
      <div class="field"><label>Height (cm)</label><input type="number" id="cal-h" placeholder="175"></div>
    </div>
    <div class="row">
      <div class="field"><label>Age</label><input type="number" id="cal-age" placeholder="25"></div>
      <div class="field"><label>Gender</label><select id="cal-g"><option>Male</option><option>Female</option></select></div>
    </div>
    <div class="field"><label>Activity Level</label>
      <select id="cal-act">
        <option value="1.2">Sedentary (little/no exercise)</option>
        <option value="1.375">Lightly active (1-3 days/wk)</option>
        <option value="1.55">Moderately active (3-5 days/wk)</option>
        <option value="1.725">Very active (6-7 days/wk)</option>
        <option value="1.9">Extra active (physical job)</option>
      </select>
    </div>
    ${btn('Calculate','calcCalorie()')}${res('cal-res')}`);

  case 'body-fat': return wrap('Estimate body fat percentage (US Navy method).',`
    <div class="field"><label>Gender</label><select id="bf-g"><option>Male</option><option>Female</option></select></div>
    <div class="field"><label>Height (cm)</label><input type="number" id="bf-h" placeholder="175"></div>
    <div class="field"><label>Waist Circumference (cm)</label><input type="number" id="bf-waist" placeholder="80"></div>
    <div class="field"><label>Neck Circumference (cm)</label><input type="number" id="bf-neck" placeholder="38"></div>
    <div class="field"><label>Hip (cm, females only)</label><input type="number" id="bf-hip" placeholder="90"></div>
    ${btn('Calculate','calcBodyFat()')}${res('bf-res')}`);

  case 'ideal-weight': return wrap('Ideal body weight using multiple formulas.',`
    <div class="row">
      <div class="field"><label>Height (cm)</label><input type="number" id="iw-h" placeholder="175"></div>
      <div class="field"><label>Gender</label><select id="iw-g"><option>Male</option><option>Female</option></select></div>
    </div>
    ${btn('Calculate','calcIdealWeight()')}${res('iw-res')}`);

  case 'water-intake': return wrap('Daily water intake recommendation.',`
    <div class="field"><label>Weight (kg)</label><input type="number" id="wi-w" placeholder="70"></div>
    <div class="field"><label>Activity Level</label>
      <select id="wi-act"><option value="1">Sedentary</option><option value="1.3">Moderate</option><option value="1.6">Active</option></select>
    </div>
    ${btn('Calculate','calcWater()')}${res('wi-res')}`);

  case 'heart-rate': return wrap('Target heart rate zones for exercise.',`
    <div class="field"><label>Age</label><input type="number" id="hr-age" placeholder="30"></div>
    <div class="field"><label>Resting Heart Rate (bpm)</label><input type="number" id="hr-rest" placeholder="65"></div>
    ${btn('Calculate','calcHR()')}${res('hr-res')}`);

  case 'due-date': return wrap('Pregnancy due date calculator.',`
    <div class="field"><label>First Day of Last Menstrual Period</label><input type="date" id="dd-lmp"></div>
    ${btn('Calculate','calcDueDate()')}${res('dd-res')}`);

  case 'ovulation': return wrap('Ovulation window calculator.',`
    <div class="field"><label>First Day of Last Period</label><input type="date" id="ov-lmp"></div>
    <div class="field"><label>Cycle Length (days)</label><input type="number" id="ov-cycle" value="28"></div>
    ${btn('Calculate','calcOvulation()')}${res('ov-res')}`);

  // ── MATH / EDUCATION
  case 'quadratic': return wrap('Solve ax² + bx + c = 0',`
    <div class="row">
      <div class="field"><label>a</label><input type="number" id="qa" value="1"></div>
      <div class="field"><label>b</label><input type="number" id="qb" value="-5"></div>
      <div class="field"><label>c</label><input type="number" id="qc" value="6"></div>
    </div>
    ${btn('Solve','calcQuadratic()')}${res('quad-res')}`);

  case 'log-calc': return wrap('Calculate logarithms.',`
    <div class="field"><label>Value</label><input type="number" id="log-v" placeholder="e.g. 100"></div>
    <div class="field"><label>Base</label>
      <select id="log-base"><option value="10">Base 10 (log)</option><option value="e">Natural (ln)</option><option value="2">Base 2</option><option value="custom">Custom</option></select>
    </div>
    <div class="field"><label>Custom Base</label><input type="number" id="log-custom" placeholder="e.g. 3"></div>
    ${btn('Calculate','calcLog()')}${res('log-res')}`);

  case 'trig': return wrap('Trigonometric function calculator.',`
    <div class="field"><label>Angle Value</label><input type="number" id="trig-val" placeholder="e.g. 45"></div>
    <div class="field"><label>Unit</label><select id="trig-unit"><option>Degrees</option><option>Radians</option></select></div>
    ${btn('Calculate','calcTrig()')}${res('trig-res')}`);

  case 'probability': return wrap('Basic probability calculator.',`
    <div class="field"><label>Favorable Outcomes</label><input type="number" id="prob-f" placeholder="e.g. 3"></div>
    <div class="field"><label>Total Outcomes</label><input type="number" id="prob-t" placeholder="e.g. 6"></div>
    ${btn('Calculate','calcProb()')}${res('prob-res')}`);

  case 'permcomb': return wrap('Permutations and Combinations: nPr and nCr.',`
    <div class="row">
      <div class="field"><label>n</label><input type="number" id="pc-n" placeholder="10" min="0"></div>
      <div class="field"><label>r</label><input type="number" id="pc-r" placeholder="3" min="0"></div>
    </div>
    ${btn('Calculate','calcPC()')}${res('pc-res')}`);

  case 'prime': return wrap('Check if a number is prime and find nearby primes.',`
    <div class="field"><label>Number</label><input type="number" id="prime-n" placeholder="e.g. 97" min="2"></div>
    ${btn('Check','checkPrime()')}${res('prime-res')}`);

  case 'lcm-gcd': return wrap('Find LCM and GCD of two or more numbers.',`
    <div class="field"><label>Numbers (comma-separated)</label><input type="text" id="lg-nums" placeholder="e.g. 12, 18, 24"></div>
    ${btn('Calculate','calcLCMGCD()')}${res('lg-res')}`);

// ─── UNIT CONVERTER TEMPLATE ──────────────────────────────────────────────────
function unitConvHTML(id, title, units){
  const opts = units.map(u=>`<option value="${u[2]}">${u[0]} (${u[1]})</option>`).join('');
  return `<div class="tool-title">${title}</div><div class="tool-desc">Convert between ${title.replace(' Converter','')} units.</div><div class="card">
    <div class="field"><label>Value</label><input type="number" id="${id}-val" placeholder="Enter value" oninput="convUnit('${id}')"></div>
    <div class="row">
      <div class="field"><label>From</label><select id="${id}-from" onchange="convUnit('${id}')">${opts}</select></div>
      <div class="field"><label>To</label><select id="${id}-to" onchange="convUnit('${id}')">${opts}</select></div>
    </div>
    <div class="result show" id="${id}-res" style="display:block"></div>
  </div>`;
}

function convUnit(id){
  const v = parseFloat(document.getElementById(id+'-val').value);
  const from = parseFloat(document.getElementById(id+'-from').value);
  const to = parseFloat(document.getElementById(id+'-to').value);
  const res = document.getElementById(id+'-res');
  if(isNaN(v)){res.innerHTML='';return;}
  const base = v * from;
  const result = base / to;
  res.innerHTML = `<div class="result-main">${fmt(result)}</div>`;
  res.style.display='block';
}

// ─── AFTER RENDER (init interactive tools) ───────────────────────────────────

  if(id==='simple-calc') scInit();

  if(id==='color-picker') updateColorPicker();
  if(id==='gradient-gen') updateGradient();
  if(id==='box-shadow') updateShadow();
  if(id==='css-button') updateCSSBtn();
  if(id==='spin-wheel') { setTimeout(drawWheel,100); }
  if(id==='typing-test') newTypingText();
  if(id==='temperature') calcTemp();
  if(id==='timezone') convTZ();
  if(id==='todo') renderTodos();
}

// ─── SIMPLE CALCULATOR ────────────────────────────────────────────────────────
let scExpr='', scVal='0', scJustCalc=false;
function scInit(){ scExpr=''; scVal='0'; scJustCalc=false; scUpdate(); }
function scKey(k){
  if(k==='clear'){scExpr='';scVal='0';scJustCalc=false;}
  else if(k==='='){
    try{
      let e=scExpr.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-');
      scVal=String(eval(e));
      scExpr=scVal;
      scJustCalc=true;
    }catch{scVal='Err';}
  } else {
    const ops=['÷','×','−','+'];
    if(scJustCalc && !ops.includes(k)){scExpr='';scVal='0';}
    scJustCalc=false;
    if(ops.includes(k)){scExpr+=' '+k+' ';}
    else { if(scVal==='0'&&k!=='.'){scExpr=scExpr.trimEnd(); scExpr+=(scExpr?'':'')+k;}else{scExpr+=k;} scVal=scExpr.split(/[÷×−+]/).pop().trim()||'0'; }
  }
  scUpdate();
}
function scUpdate(){
  document.getElementById('sc-expr').textContent=scExpr;
  document.getElementById('sc-disp').textContent=scVal;
}

// ─── SCIENTIFIC CALCULATOR ────────────────────────────────────────────────────
let sciExpr='', sciVal='0';
function sciInit(){ sciExpr=''; sciVal='0'; sciUpdate(); }
function sciKey(k){
  const ops=['÷','×','−','+'];
  if(k==='C'){sciExpr='';sciVal='0';}
  else if(k==='='){
    try{
      let e=sciExpr
        .replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-')
        .replace(/sin/g,'Math.sin').replace(/cos/g,'Math.cos').replace(/tan/g,'Math.tan')
        .replace(/log/g,'Math.log10').replace(/ln/g,'Math.log')
        .replace(/√/g,'Math.sqrt').replace(/π/g,'Math.PI').replace(/e(?![+\-\d])/g,'Math.E')
        .replace(/x²/g,'**2').replace(/xʸ/g,'**');
      sciVal=String(parseFloat(eval(e).toFixed(10)));
      sciExpr=sciVal;
    }catch{sciVal='Error';}
  } else if(['sin','cos','tan','log','ln','√'].includes(k)){
    sciExpr+=k+'(';
  } else if(k==='x²'){sciExpr+='**2';}
  else if(k==='xʸ'){sciExpr+='**';}
  else if(k==='π'){sciExpr+='π';}
  else if(k==='e'){sciExpr+='e';}
  else {sciExpr+=k;}
  if(k!=='=') sciVal=sciExpr;
  sciUpdate();
}
function sciUpdate(){
  document.getElementById('sci-expr').textContent=sciExpr;
  document.getElementById('sci-disp').textContent=sciVal;
}

function fmtINR(n){ return '₹'+parseFloat(n.toFixed(2)).toLocaleString('en-IN'); }
function showRes(id, main, rows=[]){

function calcPct(){

  let r,label;
  if(m==='1'){r=a*b/100;label=`${a}% of ${b}`;}

// ─── FRACTION ─────────────────────────────────────────────────────────────────
function calcFraction(){
  let n1=gv('fn1'),d1=gv('fd1'),n2=gv('fn2'),d2=gv('fd2'),op=gvs('fop');
  if([n1,d1,n2,d2].some(isNaN)||d1===0||d2===0)return;
  let rn,rd;
  if(op==='+'){rn=n1*d2+n2*d1;rd=d1*d2;}
  else if(op==='−'){rn=n1*d2-n2*d1;rd=d1*d2;}
  else if(op==='×'){rn=n1*n2;rd=d1*d2;}
  else{rn=n1*d2;rd=d1*n2;}
  const g=gcd(Math.abs(rn),Math.abs(rd));
  showRes('frac-res',`${rn/g} / ${rd/g}`,[[`Decimal`,`${fmt(rn/rd)}`]]);
}
function gcd(a,b){return b===0?a:gcd(b,a%b);}

// ─── RATIO ────────────────────────────────────────────────────────────────────
function calcRatio(){
  const a=gv('ra'),b=gv('rb'),c=gv('rc');

  const g=gcd(a,b);
  let rows=[['Simplified',`${a/g} : ${b/g}`]];
  if(!isNaN(c)){rows.push(['D (= B×C/A)',`${fmt(b*c/a)}`]);}

// ─── MEAN/MEDIAN/MODE ─────────────────────────────────────────────────────────
function calcMMM(){
  const nums=parseNums('mmm-nums').sort((a,b)=>a-b);
  if(!nums.length)return;
  const mean=nums.reduce((a,b)=>a+b,0)/nums.length;
  const mid=Math.floor(nums.length/2);
  const median=nums.length%2?nums[mid]:(nums[mid-1]+nums[mid])/2;
  const freq={};nums.forEach(n=>freq[n]=(freq[n]||0)+1);
  const maxF=Math.max(...Object.values(freq));
  const mode=Object.keys(freq).filter(k=>freq[k]===maxF).join(', ');
  showRes('mmm-res',`Mean: ${fmt(mean)}`,[['Median',fmt(median)],['Mode',mode],['Count',nums.length]]);
}

// ─── STD DEV ──────────────────────────────────────────────────────────────────
function calcSD(){
  const nums=parseNums('sd-nums'),type=gvs('sd-type');
  if(!nums.length)return;
  const mean=nums.reduce((a,b)=>a+b,0)/nums.length;
  const variance=nums.reduce((a,b)=>a+Math.pow(b-mean,2),0)/(type==='p'?nums.length:nums.length-1);
  showRes('sd-res',`σ = ${fmt(Math.sqrt(variance))}`,[['Variance',fmt(variance)],['Mean',fmt(mean)]]);
}

function calcTax(){

  if(regime==='new'){
    const slabs=[[300000,0],[400000,0.05],[300000,0.10],[300000,0.15],[300000,0.20],[Infinity,0.30]];
    let rem=inc,base=0;
    for(const [s,r]of slabs){const chunk=Math.min(rem,s);tax+=chunk*r;rem-=chunk;base+=s;if(rem<=0)break;}
    if(inc<=700000)tax=Math.min(tax,inc-300000>0?inc-300000:0);
  } else {
    if(inc>1000000)tax=112500+(inc-1000000)*0.30;
    else if(inc>500000)tax=12500+(inc-500000)*0.20;
    else if(inc>250000)tax=(inc-250000)*0.05;

  const len=parseInt(gvs('pw-len'))||16,cnt=parseInt(gvs('pw-count'))||3;
  const upper='ABCDEFGHIJKLMNOPQRSTUVWXYZ',lower='abcdefghijklmnopqrstuvwxyz',nums='0123456789',syms='!@#$%^&*()-_=+[]{}|;:,.<>?';
  let chars='';
  if(document.getElementById('pw-upper').checked)chars+=upper;
  if(document.getElementById('pw-lower').checked)chars+=lower;
  if(document.getElementById('pw-nums').checked)chars+=nums;
  if(document.getElementById('pw-syms').checked)chars+=syms;
  if(!chars)return;
  const pws=Array.from({length:cnt},()=>Array.from({length:len},()=>chars[Math.floor(Math.random()*chars.length)]).join(''));
  const el=document.getElementById('pw-res');

function genUUID(){

function convColor(){
  const v=document.getElementById('cc-in').value.trim();
  const el=document.getElementById('cc-res'),sw=document.getElementById('cc-sw'),lbl=document.getElementById('cc-lbl');
  let r,g,b;
  if(/^#([0-9a-f]{3}){1,2}$/i.test(v)){
    const hex=v.replace('#','');
    const full=hex.length===3?hex.split('').map(c=>c+c).join(''):hex;
    r=parseInt(full.slice(0,2),16);g=parseInt(full.slice(2,4),16);b=parseInt(full.slice(4,6),16);
  } else if(v.startsWith('rgb')){
    [r,g,b]=v.match(/\d+/g).map(Number);
  } else return;
  const hex='#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  const max=Math.max(r,g,b)/255,min=Math.min(r,g,b)/255,l=(max+min)/2;
  const d=max-min;const s=d===0?0:d/(1-Math.abs(2*l-1));
  let h=0;
  if(d!==0){if(max===r/255)h=((g-b)/255/d)%6;else if(max===g/255)h=(b-r)/255/d+2;else h=(r-g)/255/d+4;h=Math.round(h*60);}
  if(h<0)h+=360;
  document.getElementById('cc-swatch').style.display='block';
  sw.style.background=hex;lbl.textContent=hex;
  showRes('cc-res',hex,[['RGB',`rgb(${r}, ${g}, ${b})`],['HSL',`hsl(${h}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`]]);
}

    const now=new Date(),diff=target-now;
    if(diff<=0){clearInterval(cdInterval);document.getElementById('cd-display').textContent='00:00:00:00';return;}
    const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
    document.getElementById('cd-display').textContent=`${String(d).padStart(2,'0')}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

function typingInput(){
  const inp=document.getElementById('typing-input');if(!inp)return;
  const val=inp.value;
  if(!typingStart&&val.length>0){
    typingStart=Date.now();
    typingInterval=setInterval(()=>{
      const elapsed=(Date.now()-typingStart)/1000;
      document.getElementById('typ-time').textContent=Math.round(elapsed)+'s';
    },1000);
  }
  let correct=0;
  for(let i=0;i<typingTarget.length;i++){
    const span=document.getElementById('tc'+i);if(!span)continue;
    span.className=i<val.length?(val[i]===typingTarget[i]?'correct':'wrong'):(i===val.length?'current':'');
    if(i<val.length&&val[i]===typingTarget[i])correct++;

  const elapsed=(Date.now()-typingStart)/1000||1;
  const words=val.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('wpm-val').textContent=Math.round(words/(elapsed/60));
  document.getElementById('acc-val').textContent=Math.round(correct/Math.max(val.length,1)*100)+'%';
  if(val.length>=typingTarget.length)clearInterval(typingInterval);
}

// ─── SPIN WHEEL ───────────────────────────────────────────────────────────────
let wheelAngle=0,wheelSpinning=false;
const WHEEL_COLORS=['#7c6aff','#ff6a9b','#6affd4','#ffd46a','#6aaeff','#ff9e6a','#c46aff','#6aff8e'];
function drawWheel(){
  const canvas=document.getElementById('wheel-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const items=gvs('wheel-items').split(',').map(s=>s.trim()).filter(Boolean);
  if(!items.length)return;
  const arc=2*Math.PI/items.length,cx=150,cy=150,r=140;
  ctx.clearRect(0,0,300,300);
  items.forEach((item,i)=>{
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,wheelAngle+arc*i,wheelAngle+arc*(i+1));
    ctx.fillStyle=WHEEL_COLORS[i%WHEEL_COLORS.length];ctx.fill();
    ctx.strokeStyle='#0a0a0f';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(wheelAngle+arc*i+arc/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 13px Syne,sans-serif';
    ctx.fillText(item.length>12?item.slice(0,12)+'…':item,r-10,5);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,12,0,2*Math.PI);ctx.fillStyle='#0a0a0f';ctx.fill();
  ctx.beginPath();ctx.moveTo(290,cy-10);ctx.lineTo(300,cy);ctx.lineTo(290,cy+10);ctx.fillStyle='#ff6a9b';ctx.fill();
}
function spinWheel(){
  if(wheelSpinning)return;wheelSpinning=true;
  const items=gvs('wheel-items').split(',').map(s=>s.trim()).filter(Boolean);
  const spins=Math.PI*2*(5+Math.random()*5)+Math.random()*Math.PI*2;
  const duration=4000,start=Date.now(),startAngle=wheelAngle;
  function animate(){
    const elapsed=Date.now()-start,progress=Math.min(elapsed/duration,1);
    const ease=1-Math.pow(1-progress,4);
    wheelAngle=startAngle+spins*ease;
    drawWheel();
    if(progress<1)requestAnimationFrame(animate);
    else{
      wheelSpinning=false;
      const arc=2*Math.PI/items.length;
      const normalized=((wheelAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const idx=Math.floor(((2*Math.PI-normalized)%(2*Math.PI))/arc)%items.length;
      showRes('wheel-res','🎉 '+items[idx],[]);
    }
  }
  requestAnimationFrame(animate);
}

function calcOhm(){
  const v=gv('ohm-v'),i=gv('ohm-i'),r=gv('ohm-r');
  const known=[!isNaN(v),!isNaN(i),!isNaN(r)].filter(Boolean).length;
  if(known<2)return;
  if(isNaN(v))showRes('ohm-res',`V = ${fmt(i*r)} V`,[['I × R',`${i} × ${r}`]]);
  else if(isNaN(i))showRes('ohm-res',`I = ${fmt(v/r)} A`,[['V / R',`${v} / ${r}`]]);
  else showRes('ohm-res',`R = ${fmt(v/i)} Ω`,[['V / I',`${v} / ${i}`]]);
}
function calcVC(){
  const solve=gvs('vc-solve'),v1=gv('vc-v1'),v2=gv('vc-v2');
  if(isNaN(v1)||isNaN(v2))return;
  const labels={v:['Current (A)','Resistance (Ω)'],i:['Voltage (V)','Resistance (Ω)'],r:['Voltage (V)','Current (A)'],p:['Voltage (V)','Current (A)']};
  let res;

  else res=`P = ${fmt(v1*v2)} W`;

}

  const f=gv('pr-f'),a=gv('pr-a'),p=gv('pr-p');
  if(!isNaN(f)&&!isNaN(a))showRes('prsci-res',`P = ${fmt(f/a)} Pa`,[]);
  else if(!isNaN(p)&&!isNaN(a))showRes('prsci-res',`F = ${fmt(p*a)} N`,[]);
  else if(!isNaN(p)&&!isNaN(f))showRes('prsci-res',`A = ${fmt(f/p)} m²`,[]);
}
function calcWork(){
  const f=gv('we-f'),d=gv('we-d'),w=gv('we-w');
  if(!isNaN(f)&&!isNaN(d))showRes('we-res',`W = ${fmt(f*d)} J`,[]);
  else if(!isNaN(w)&&!isNaN(d))showRes('we-res',`F = ${fmt(w/d)} N`,[]);
  else if(!isNaN(w)&&!isNaN(f))showRes('we-res',`d = ${fmt(w/f)} m`,[]);
}
function calcMotion(){
  const u=gv('mot-u'),a=gv('mot-a'),t=gv('mot-t');
  if([u,a,t].some(isNaN))return;
  const v=u+a*t,s=u*t+0.5*a*t*t;
  showRes('mot-res',`v = ${fmt(v)} m/s`,[['Distance s',`${fmt(s)} m`],['v² = u² + 2as',`${fmt(v*v)} = ${fmt(u*u+2*a*s)}`]]);
}

// ─── REAL LIFE ────────────────────────────────────────────────────────────────
function calcAge(){
  const dob=new Date(gvs('age-dob'));if(!dob.getFullYear())return;
  const now=new Date();
  let y=now.getFullYear()-dob.getFullYear(),m=now.getMonth()-dob.getMonth(),d=now.getDate()-dob.getDate();
  if(d<0){m--;d+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}
  if(m<0){y--;m+=12;}
  const totalDays=Math.floor((now-dob)/86400000);
  showRes('age-res',`${y} years`,[[`${m} months ${d} days`,''],['Total Days',totalDays.toLocaleString()],['Next Birthday',nextBirthday(dob)]]);
}
function nextBirthday(dob){
  const now=new Date(),next=new Date(now.getFullYear(),dob.getMonth(),dob.getDate());
  if(next<now)next.setFullYear(now.getFullYear()+1);
  const days=Math.ceil((next-now)/86400000);
  return `${days} days away`;
}
function calcDateDiff(){
  const s=new Date(gvs('dd-start')),e=new Date(gvs('dd-end'));
  if(!s.getTime()||!e.getTime())return;
  const diff=Math.abs(e-s);
  const d=Math.floor(diff/86400000),w=Math.floor(d/7),m=Math.floor(d/30.44),y=Math.floor(d/365.25);
  showRes('datediff-res',`${d} days`,[['Weeks',w],['Months',m],['Years',y]]);
}
function convTZ(){
  const time=gvs('tz-time'),offset=gv('tz-sel');
  if(!time)return;
  const [h,m]=time.split(':').map(Number);
  const el=document.getElementById('tz-res');
  const zones=[{name:'UTC',o:0},{name:'IST',o:5.5},{name:'CST',o:8},{name:'EST',o:-5},{name:'PST',o:-8},{name:'CET',o:1},{name:'JST',o:9},{name:'BRT',o:-3}];
  const baseMin=h*60+m-offset*60;
  el.innerHTML=zones.map(z=>{
    const local=((baseMin+z.o*60)%(24*60)+24*60)%(24*60);
    const hh=Math.floor(local/60),mm=local%60;
    return `<div class="result-row"><span>${z.name}</span><span>${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}</span></div>`;
  }).join('');
  el.style.display='block';
}
function calcTip(){
  const bill=gv('tip-bill'),pct=gv('tip-pct');
  if(isNaN(bill))return;
  const tip=bill*pct/100;
  showRes('tip-res',`Total: ${fmt(bill+tip)}`,[['Tip Amount',fmt(tip)],['Tip %',pct+'%']]);
}
function calcSplit(){
  const bill=gv('sb-bill'),ppl=gv('sb-people'),tip=gv('sb-tip');
  if([bill,ppl].some(isNaN)||ppl===0)return;
  const total=bill*(1+tip/100),perPerson=total/ppl;
  showRes('sb-res',`${fmt(perPerson)} per person`,[['Total with Tip',fmt(total)],['Tip Amount',fmt(bill*tip/100)]]);
}
function calcCooking(){
  const v=gv('cook-val'),from=gvs('cook-from');
  if(isNaN(v))return;
  const toMl={cup:236.588,tbsp:14.787,tsp:4.929,ml:1,L:1000};
  const toG={oz:28.3495,lb:453.592,g:1,kg:1000};
  const el=document.getElementById('cook-res');
  let rows=[];
  if(toMl[from]){const ml=v*toMl[from];rows=[['mL',fmt(ml)],['L',fmt(ml/1000)],['cup',fmt(ml/236.588)],['tbsp',fmt(ml/14.787)],['tsp',fmt(ml/4.929)]];}
  else if(toG[from]){const g=v*toG[from];rows=[['g',fmt(g)],['kg',fmt(g/1000)],['oz',fmt(g/28.3495)],['lb',fmt(g/453.592)]];}
  el.innerHTML=`<div class="result-main">${v} ${from}</div>`+rows.map(([l,val])=>`<div class="result-row"><span>${l}</span><span>${val}</span></div>`).join('');
  el.style.display='block';
}
function calcFuelCost(){
  const d=gv('fc-dist'),eff=gv('fc-eff'),price=gv('fc-price');
  if([d,eff,price].some(isNaN)||eff===0)return;
  const liters=d/eff,cost=liters*price;
  showRes('fc-res',fmtINR(cost),[['Fuel Needed',`${fmt(liters)} L`],['Cost per km',fmtINR(cost/d)]]);
}
function calcTravelTime(){
  const d=gv('tt-dist'),s=gv('tt-speed');
  if([d,s].some(isNaN)||s===0)return;
  const hrs=d/s,h=Math.floor(hrs),m=Math.round((hrs-h)*60);
  showRes('tt-res',`${h}h ${m}m`,[['Distance',d+' km'],['Speed',s+' km/h']]);
}

buildSidebar();
renderHome();
